const PHASES = ["エリア判定","目的確認","属性判定","定量判定","結果"];
const PHASE_ICONS = ["📍","🎯","👤","📏","🏁"];
const PHASE_COLORS = {
  "エリア判定": { bg: "#EEF2FF", fg: "#4338CA" },
  "目的確認":   { bg: "#ECFDF5", fg: "#065F46" },
  "属性判定":   { bg: "#FFFBEB", fg: "#92400E" },
  "定量判定":   { bg: "#FFF1F2", fg: "#9F1239" },
  "結果":       { bg: "#F5F3FF", fg: "#5B21B6" },
};

const ProgressBar = ({ currentPhase }) => {
  const ci = Math.max(0, PHASES.indexOf(currentPhase));
  const pct = ((ci) / (PHASES.length - 1)) * 100;
  return (
    <div style={{ marginBottom: 28 }}>
      <div style={{ position: "relative", height: 6, background: "#E5E7EB", borderRadius: 99 }}>
        <div style={{ position: "absolute", left: 0, top: 0, height: "100%", borderRadius: 99, background: "linear-gradient(90deg, #6366F1, #10B981, #F59E0B, #F43F5E, #8B5CF6)", width: `${pct}%`, transition: "width 0.5s cubic-bezier(0.4,0,0.2,1)" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10 }}>
        {PHASES.map((p, i) => (
          <div key={p} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, opacity: i <= ci ? 1 : 0.35, transition: "opacity 0.3s", flex: 1 }}>
            <span style={{ fontSize: 16 }}>{PHASE_ICONS[i]}</span>
            <span style={{ fontSize: 10, fontWeight: i === ci ? 700 : 500, color: i === ci ? PHASE_COLORS[p].fg : "#6B7280", letterSpacing: 0.5 }}>{p}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

const LawBadge = ({ law, size = "sm" }) => {
  if (!law || law === "—") return null;
  const bg = law.startsWith("法") ? "#1E3A5F" : law.startsWith("条例") ? "#7C2D12" : law.startsWith("令") ? "#4A1D96" : law.startsWith("農") ? "#166534" : law.startsWith("審") ? "#475569" : "#374151";
  const s = size === "lg" ? { fontSize: 14, padding: "6px 14px" } : { fontSize: 11, padding: "3px 8px" };
  return <span style={{ display: "inline-block", borderRadius: 6, background: bg, color: "#fff", fontWeight: 700, whiteSpace: "nowrap", letterSpacing: 0.3, ...s }}>{law}</span>;
};

const ConditionChecklist = ({ conditions, label, note }) => (
  <div style={{ margin: "16px 0 20px", padding: "20px", background: "#FFFBEB", borderRadius: 16, border: "2px solid #FDE68A" }}>

          <div style={{ padding: "12px 16px", background: "#1E3A5F", color: "#fff", fontSize: 13, fontWeight: 700, textAlign: "center" }}>開発相談ナビ 判定フロー票 — {new Date().toLocaleDateString("ja-JP")}</div>
          {trail.map((e, i) => (
            <div key={i} style={{ display: "flex", gap: 12, padding: "10px 16px", borderBottom: "1px solid #F3F4F6", alignItems: "center", background: i % 2 === 0 ? "#fff" : "#FAFAFA", fontSize: 13 }}>
              <span style={{ width: 22, height: 22, borderRadius: "50%", flexShrink: 0, background: "#EEF2FF", color: "#4338CA", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700 }}>{i + 1}</span>
              <span style={{ color: "#9CA3AF", fontSize: 11, width: 56, flexShrink: 0 }}>{e.phase}</span>
              <span style={{ flex: 1, color: "#374151" }}>{e.answer}</span>
              <LawBadge law={e.law} />
            </div>
          ))}
        </div>
      </details>
      <div style={{ display: "flex", gap: 12 }}>
        <button onClick={onBack} style={{ flex: 1, padding: "16px", background: "#F3F4F6", color: "#374151", border: "2px solid #E5E7EB", borderRadius: 14, cursor: "pointer", fontSize: 15, fontWeight: 700 }}
          onMouseEnter={e => e.currentTarget.style.background = "#E5E7EB"} onMouseLeave={e => e.currentTarget.style.background = "#F3F4F6"}>← 戻る</button>
        <button onClick={onRestart} style={{ flex: 1, padding: "16px", background: "linear-gradient(135deg, #4338CA, #6366F1)", color: "#fff", border: "none", borderRadius: 14, cursor: "pointer", fontSize: 15, fontWeight: 700, boxShadow: "0 4px 14px rgba(99,102,241,0.3)" }}
          onMouseEnter={e => e.currentTarget.style.transform = "translateY(-1px)"} onMouseLeave={e => e.currentTarget.style.transform = "translateY(0)"}>🔄 最初からやり直す</button>
      </div>
    </div>
  );
};

const LandingScreen = ({ onStart }) => (
  <div style={{ textAlign: "center", padding: "20px 0", animation: "cardIn 0.5s cubic-bezier(0.16,1,0.3,1)" }}>
    <div style={{ fontSize: 64, marginBottom: 16, filter: "drop-shadow(0 4px 8px rgba(0,0,0,0.1))" }}>🏗️</div>
    <h2 style={{ fontSize: 22, fontWeight: 800, color: "#1F2937", lineHeight: 1.5, marginBottom: 8 }}>開発許可の要否を<br />かんたん診断</h2>
    <p style={{ fontSize: 14, color: "#6B7280", lineHeight: 1.8, maxWidth: 380, margin: "0 auto 28px" }}>いくつかの質問に答えるだけで、あなたの建築計画に必要な手続きがわかります。所要時間は約2〜5分です。</p>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, maxWidth: 400, margin: "0 auto 32px" }}>
      {[{ icon: "⏱️", label: "約2〜5分" }, { icon: "🏛️", label: "岡崎市版" }, { icon: "🆓", label: "無料" }].map(f => (
        <div key={f.label} style={{ padding: "16px 8px", background: "#F9FAFB", borderRadius: 14, border: "1px solid #E5E7EB" }}>
          <div style={{ fontSize: 24, marginBottom: 6 }}>{f.icon}</div>
          <div style={{ fontSize: 12, fontWeight: 600, color: "#374151" }}>{f.label}</div>
        </div>
      ))}
    </div>
    <button onClick={onStart} style={{ width: "100%", maxWidth: 360, padding: "18px 32px", background: "linear-gradient(135deg, #4338CA, #6366F1)", color: "#fff", border: "none", borderRadius: 16, cursor: "pointer", fontSize: 18, fontWeight: 800, letterSpacing: 1, boxShadow: "0 6px 20px rgba(99,102,241,0.35)", transition: "all 0.2s" }}
      onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 30px rgba(99,102,241,0.45)"; }}
      onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "0 6px 20px rgba(99,102,241,0.35)"; }}>
      診断をはじめる →
    </button>
  </div>
);

// ============================================================
// Main App
// ============================================================
function App() {
  const [started, setStarted] = useState(false);
  const [cur, setCur] = useState("P1_AREA");
  const [hist, setHist] = useState([]);
  const [trail, setTrail] = useState([]);
  const [dp, setDp] = useState(null);
  const mainRef = useRef(null);
  const step = STEPS[cur];

  useEffect(() => {
    if (mainRef.current) mainRef.current.scrollTo?.({ top: 0, behavior: "smooth" });
  }, [cur]);

  const choose = (opt) => {
    if (opt.selfRef) return;
    setTrail(p => [...p, { phase: step.phase, question: step.question, answer: opt.label.split("→")[0].trim(), law: opt.law || "—" }]);
    if (opt.rp) setDp(opt.rp);
    setHist(p => [...p, cur]);
    setCur(opt.next);
  };
  const back = () => { if (hist.length > 0) { const p = [...hist]; setCur(p.pop()); setHist(p); setTrail(t => t.slice(0, -1)); } };
  const restart = () => { setHist([]); setTrail([]); setCur("P1_AREA"); setDp(null); };

  const pk = cur === "R_OK" ? dp : step.provision;
  const prov = pk ? PROVISIONS[pk] : null;
  const phaseColor = PHASE_COLORS[step.phase] || PHASE_COLORS["結果"];
  const isGrid = step.options?.length >= 4;

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(180deg, #F8FAFC 0%, #EEF2FF 50%, #F8FAFC 100%)", display: "flex", justifyContent: "center", padding: "20px 12px" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap');
        * { box-sizing: border-box; margin: 0; font-family: 'Noto Sans JP', sans-serif; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes resultIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        button:active { transform: scale(0.97) !important; }
      `}</style>
      <div ref={mainRef} style={{ width: "100%", maxWidth: 520 }}>
        <div style={{ textAlign: "center", marginBottom: 20, animation: "cardIn 0.3s ease" }}>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "#fff", padding: "8px 20px", borderRadius: 99, border: "1px solid #E5E7EB", boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
            <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: 3, color: "#9CA3AF" }}>岡崎市</span>
            <span style={{ width: 1, height: 14, background: "#E5E7EB" }} />
            <span style={{ fontSize: 15, fontWeight: 900, color: "#1F2937", letterSpacing: 2 }}>開発相談ナビ</span>
          </div>
        </div>
        <div style={{ background: "#FFFFFF", borderRadius: 24, padding: "28px 24px 32px", border: "1px solid #E5E7EB", boxShadow: "0 4px 24px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04)" }}>
          {!started ? (
            <LandingScreen onStart={() => setStarted(true)} />
          ) : step.type === "result" ? (
            <>
              <ProgressBar currentPhase="結果" />
              <ResultScreen step={step} prov={prov} trail={trail} dp={dp} onBack={back} onRestart={restart} />
            </>
          ) : (
            <div style={{ animation: "cardIn 0.35s cubic-bezier(0.16,1,0.3,1)" }}>
              <ProgressBar currentPhase={step.phase} />
              <div style={{ display: "inline-flex", alignItems: "center", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "4px 12px", borderRadius: 8, background: phaseColor.bg, color: phaseColor.fg, fontSize: 12, fontWeight: 700 }}>
                  {PHASE_ICONS[PHASES.indexOf(step.phase)]} {step.phase}
                </span>
                <LawBadge law={step.lawTag} size="sm" />
              </div>
              <h2 style={{ fontSize: 20, fontWeight: 800, color: "#111827", lineHeight: 1.6, marginBottom: 4 }}>{step.question}</h2>
              {step.type === "check" && step.howTo && <HowToCheckPanel howTo={step.howTo} />}
              {step.conditions && <ConditionChecklist conditions={step.conditions} label={step.conditionsLabel} note={step.conditionsNote} />}
              {step.help && !step.conditions && (
                <div style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.8, marginBottom: 20, whiteSpace: "pre-line", padding: "12px 16px", background: "#F9FAFB", borderRadius: 12, border: "1px solid #F3F4F6" }}>💡 {step.help}</div>
              )}
              <div style={{ display: "grid", gridTemplateColumns: isGrid ? "1fr 1fr" : "1fr", gap: 10 }}>
                {step.options.map((opt, i) => (
                  <OptionCard key={opt.label} opt={opt} onClick={() => choose(opt)} index={i} totalOptions={step.options.length} />
                ))}
              </div>
              {hist.length > 0 && (
                <button onClick={back} style={{ marginTop: 20, padding: "10px 16px", background: "none", border: "none", color: "#9CA3AF", cursor: "pointer", fontSize: 13, fontWeight: 600, display: "flex", alignItems: "center", gap: 4, transition: "color 0.2s" }}
                  onMouseEnter={e => e.currentTarget.style.color = "#4B5563"} onMouseLeave={e => e.currentTarget.style.color = "#9CA3AF"}>← 前の質問に戻る</button>
              )}
            </div>
          )}
        </div>
        <div style={{ textAlign: "center", marginTop: 16, fontSize: 11, color: "#9CA3AF", lineHeight: 1.7 }}>
          <div>本システムの判定は参考情報です。正式な可否判断は建築指導課の審査にて行います。</div>
          <div style={{ marginTop: 2 }}>岡崎市 都市政策部 建築指導課（市役所西庁舎1F）☎ 0564-23-6253</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
